name: medicare
description: "MediCare — Smart Medicine Reminder & Stock Tracker App."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.5.0 <4.0.0'
  flutter: ">=3.27.0"

dependencies:
  flutter:
    sdk: flutter

  # Database
  sqflite: ^2.3.3+1
  path: ^1.9.0
  path_provider: ^2.1.4

  # Notifications
  flutter_local_notifications: ^17.2.2
  timezone: ^0.9.4

  # State management
  provider: ^6.1.2

  # Persistence / preferences
  shared_preferences: ^2.3.2

  # Utilities
  intl: ^0.19.0
  uuid: ^4.5.1
  crypto: ^3.0.5
  permission_handler: ^11.3.1

  # UI
  flutter_slidable: ^3.1.1
  animate_do: ^3.3.4
  fl_chart: ^0.68.0
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  # Assets directory is intentionally left out unless you add images.
  # If you add image files, uncomment the section below:
  # assets:
  #   - assets/images/
